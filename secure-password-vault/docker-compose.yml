version: '3.8'
services:
  vaultwarden:
    image: vaultwarden/server:latest
    # No direct ports — nginx handles HTTPS
    volumes:
      - ./vaultwarden/vw-data:/data
    environment:
      - ADMIN_TOKEN=changeme_admin_token
      - SIGNUPS_ALLOWED=true
      - DOMAIN=https://localhost:9443   # ✅ HTTPS via nginx
    restart: unless-stopped

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    environment:
      - VAULTWARDEN_URL=https://nginx:9443   # ✅ go through nginx HTTPS
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vaultuser
      POSTGRES_PASSWORD: vaultpass
      POSTGRES_DB: vaultdb
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
      - "9443:9443"       # ✅ Vaultwarden HTTPS port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - vaultwarden
      - backend
      - frontend
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run start"
    restart: unless-stopped

volumes:
  db-data: